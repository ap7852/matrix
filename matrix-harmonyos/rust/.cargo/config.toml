[target.aarch64-unknown-linux-ohos]
linker = "aarch64-unknown-linux-ohos-clang"
ar = "llvm-ar"

[env]
# ring 编译必需的环境变量
TARGET_CC = "/home/ap7852/command-line-tools/sdk/default/openharmony/native/llvm/bin/aarch64-unknown-linux-ohos-clang"
TARGET_AR = "/home/ap7852/command-line-tools/sdk/default/openharmony/native/llvm/bin/llvm-ar"
OHOS_NDK_HOME = "/home/ap7852/command-line-tools/sdk/default/openharmony"

# 增加递归限制，解决 matrix-sdk 编译问题
[build]
rustflags = ["-C", "symbol-mangling-version=v0"]